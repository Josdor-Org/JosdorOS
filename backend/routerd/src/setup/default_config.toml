[system]
hostname = "josdoros"

[network]
configured = false
wan_interface = ""
lan_interfaces = []

[dhcp]
enabled = false
ip_range_start = "10.10.0.50"
ip_range_end = "10.10.0.200"
forwarding_ip = "10.10.0.1"
lease = "12h"

# Firewall rules
# Generated by JosdorOS routerd

[firewall]
enabled = true


[[firewall.rules]]
name = "allow_ssh"
enabled = true
source = "any"
destination = "router"
protocol = "tcp"
port = 22
action = "accept"

[[firewall.rules]]
name = "allow_api"
enabled = true
source = "any"
destination = "router"
protocol = "tcp"
port = 8080
action = "accept"